<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-label="You and any AI edit Markdown notes; a build script renders them to an HTML site on every push.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9a489"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9c4221"/>
    </marker>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- frame -->
  <rect x="2" y="2" width="1196" height="536" rx="24" fill="#faf7f0" stroke="#e4ddcd" stroke-width="2"/>

  <!-- heading -->
  <text x="600" y="58" text-anchor="middle" class="serif" font-size="30" font-weight="700" fill="#2a2622">One Markdown source. Many editors. A site that renders itself.</text>
  <text x="600" y="90" text-anchor="middle" class="sans" font-size="15" fill="#8a8275">You and any AI edit only <tspan class="mono" fill="#9c4221">.md</tspan> — the HTML is generated on every push to main, never by hand.</text>

  <!-- EDITORS -->
  <text x="60" y="150" class="sans" font-size="12" letter-spacing="1.5" fill="#8a8275">EDITORS</text>

  <g>
    <rect x="60" y="162" width="172" height="44" rx="12" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="84" cy="184" r="6" fill="#2a2622"/>
    <text x="100" y="189" class="sans" font-size="15" font-weight="600" fill="#2a2622">You</text>
  </g>
  <g>
    <rect x="60" y="216" width="172" height="44" rx="12" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="84" cy="238" r="6" fill="#d97757"/>
    <text x="100" y="243" class="sans" font-size="15" font-weight="600" fill="#2a2622">Claude</text>
  </g>
  <g>
    <rect x="60" y="270" width="172" height="44" rx="12" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="84" cy="292" r="6" fill="#4285f4"/>
    <text x="100" y="297" class="sans" font-size="15" font-weight="600" fill="#2a2622">Gemini</text>
  </g>
  <g>
    <rect x="60" y="324" width="172" height="44" rx="12" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="84" cy="346" r="6" fill="#10a37f"/>
    <text x="100" y="351" class="sans" font-size="15" font-weight="600" fill="#2a2622">ChatGPT</text>
  </g>
  <text x="60" y="392" class="sans" font-size="12" font-style="italic" fill="#8a8275">+ create, edit &amp; reorder notes</text>

  <!-- converging arrows -->
  <line x1="234" y1="184" x2="466" y2="250" stroke="#b9a489" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="234" y1="238" x2="466" y2="255" stroke="#b9a489" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="234" y1="292" x2="466" y2="261" stroke="#b9a489" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="234" y1="346" x2="466" y2="266" stroke="#b9a489" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- MD source card -->
  <rect x="470" y="150" width="248" height="214" rx="16" fill="#ffffff" stroke="#e4ddcd"/>
  <rect x="490" y="172" width="156" height="24" rx="12" fill="#f3e6df"/>
  <text x="500" y="189" class="sans" font-size="11" letter-spacing="1" font-weight="700" fill="#9c4221">SOURCE OF TRUTH</text>
  <text x="490" y="230" class="mono" font-size="16" font-weight="700" fill="#2a2622">notebooks/</text>
  <g class="mono" font-size="13" fill="#5b5346">
    <rect x="492" y="250" width="13" height="15" rx="2" fill="#f3e6df" stroke="#e4ddcd"/>
    <text x="514" y="262">01-why-markdown.md</text>
    <rect x="492" y="280" width="13" height="15" rx="2" fill="#f3e6df" stroke="#e4ddcd"/>
    <text x="514" y="292">02-your-first-note.md</text>
    <rect x="492" y="310" width="13" height="15" rx="2" fill="#f3e6df" stroke="#e4ddcd"/>
    <text x="514" y="322">03-another-example.md</text>
  </g>
  <text x="594" y="388" text-anchor="middle" class="sans" font-size="12.5" fill="#8a8275">Markdown · edited by humans &amp; AI</text>

  <!-- render step -->
  <rect x="726" y="213" width="124" height="30" rx="15" fill="#ffffff" stroke="#e4ddcd"/>
  <text x="788" y="233" text-anchor="middle" class="mono" font-size="12" fill="#2a2622">build_site.py</text>
  <line x1="718" y1="257" x2="856" y2="257" stroke="#9c4221" stroke-width="1.8" marker-end="url(#arrowAccent)"/>
  <text x="787" y="283" text-anchor="middle" class="sans" font-size="11.5" fill="#8a8275">renders on push</text>

  <!-- browser / published site -->
  <rect x="862" y="148" width="288" height="216" rx="14" fill="#ffffff" stroke="#e4ddcd"/>
  <line x1="862" y1="181" x2="1150" y2="181" stroke="#ece5d6"/>
  <circle cx="882" cy="166" r="4" fill="#e2b0a3"/>
  <circle cx="898" cy="166" r="4" fill="#ecd9a8"/>
  <circle cx="914" cy="166" r="4" fill="#b8d6b0"/>
  <rect x="936" y="158" width="198" height="16" rx="8" fill="#f3efe6"/>
  <text x="946" y="170" class="mono" font-size="10" fill="#8a8275">username.github.io/notes</text>

  <!-- mock page: sidebar -->
  <rect x="876" y="197" width="62" height="150" rx="6" fill="#faf7f0"/>
  <rect x="886" y="209" width="42" height="7" rx="3.5" fill="#d9b8a8"/>
  <rect x="886" y="226" width="36" height="5" rx="2.5" fill="#e4ddcd"/>
  <rect x="886" y="240" width="38" height="5" rx="2.5" fill="#e4ddcd"/>

  <!-- mock page: main -->
  <rect x="952" y="200" width="150" height="13" rx="3" fill="#2a2622"/>
  <rect x="952" y="228" width="186" height="6" rx="3" fill="#d9ccae"/>
  <rect x="952" y="242" width="186" height="6" rx="3" fill="#e4ddcd"/>
  <rect x="952" y="256" width="158" height="6" rx="3" fill="#e4ddcd"/>
  <rect x="952" y="280" width="92" height="9" rx="3" fill="#9c4221"/>
  <rect x="952" y="300" width="186" height="6" rx="3" fill="#e4ddcd"/>
  <rect x="952" y="314" width="172" height="6" rx="3" fill="#e4ddcd"/>
  <rect x="952" y="328" width="150" height="6" rx="3" fill="#e4ddcd"/>
  <text x="1006" y="388" text-anchor="middle" class="sans" font-size="12.5" fill="#8a8275">HTML · generated, never touched</text>

  <!-- benefits -->
  <line x1="60" y1="412" x2="1140" y2="412" stroke="#ece5d6"/>
  <g class="sans" font-size="13.5" fill="#2a2622">
    <rect x="144" y="432" width="130" height="34" rx="17" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="162" cy="449" r="4" fill="#9c4221"/>
    <text x="176" y="454">Faster edits</text>

    <rect x="292" y="432" width="132" height="34" rx="17" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="310" cy="449" r="4" fill="#9c4221"/>
    <text x="324" y="454">Fewer tokens</text>

    <rect x="442" y="432" width="186" height="34" rx="17" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="460" cy="449" r="4" fill="#9c4221"/>
    <text x="474" y="454">Human + AI friendly</text>

    <rect x="646" y="432" width="178" height="34" rx="17" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="664" cy="449" r="4" fill="#9c4221"/>
    <text x="678" y="454">No HTML to wrangle</text>

    <rect x="842" y="432" width="214" height="34" rx="17" fill="#ffffff" stroke="#e4ddcd"/>
    <circle cx="860" cy="449" r="4" fill="#9c4221"/>
    <text x="874" y="454">Portable &amp; maintainable</text>
  </g>
</svg>
